game:
  name: github-issue-minesweeper
  board:
    rows: 9
    cols: 9
    mines: 10
  state:
    marker: "MINESWEEPER_STATE_V1"
    signature_algorithm: "hmac-sha256"
  commands:
    reveal:
      - /reveal
    flag:
      - /flag
    unflag:
      - /unflag
    chord:
      - /chord
    giveup:
      - /giveup
  room_policy:
    one_active_room_per_player: true
    owner_only_commands: true
  rendering:
    format: "code-grid"
    hidden: "⬜"
    flag: "🚩"
    mine: "💣"
    exploded: "💥"
    empty: "·"
github:
  labels:
    active: "game:minesweeper"
    won: "game:minesweeper:won"
    lost: "game:minesweeper:lost"
    archived: "game:minesweeper:archived"
  issue_template:
    path: ".github/ISSUE_TEMPLATE/minesweeper-room.yml"
docker:
  image_name: "gh-issue-minesweeper"
  service_name: "game"
