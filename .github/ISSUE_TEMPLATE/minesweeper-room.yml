name: "Minesweeper Room"
description: "Start a new Minesweeper game room"
title: "Minesweeper Room"
labels:
  - "game:minesweeper"
body:
  - type: markdown
    attributes:
      value: |
        **A new Minesweeper room will be created for you.**

        Once you submit this issue, a bot will post a fresh 9x9 board.
        Play by commenting commands:

        - `/reveal B3` — reveal a cell
        - `/flag H7` — flag a suspected mine
        - `/unflag H7` — remove a flag
        - `/chord C4` — chord-reveal around a numbered cell
        - `/giveup` — end the game

        Only you (the issue opener) can play in this room.
  
  - type: checkboxes
    id: conduct
    title: "Conduct"
    attributes:
      description: "I have read the CODE_OF_CONDUCT and agree to respect the rules of the repository"
      required: true
    validations:
      required: true


  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: By participating, you agree to follow our [Code of Conduct](https://github.com/hesreallyhim/).
      options:
        - label: I have read the Code of Conduct and agree to respect the rules and standards of this repository.
          required: true
      validations:
        required: true
