name: "Minesweeper Room"
description: "Start a new Minesweeper game room"
title: "Minesweeper Room"
labels:
  - "game:minesweeper"
body:
  - type: markdown
    attributes:
      value: |
        **A new Minesweeper room will be created for you.**

        Wait for the bot to create your board, then comment in the thread to make a move.

        You will have **30 minutes** to complete the game.

        Feel free to play again, but **don't open more than one issue at a time.**

        **Gameplay commands:**

        - **Reveal cells:** `A1` - or: `guess A1`, `reveal A1`
        - **Flag suspected mines:** `flag H7`
        - **Remove flags:** `unflag H7`
        - **End the game:** `giveup`

        <details>
        <summary>Notes on Gameplay</summary>

        - Commands are **case-insensitive**.
        - Each line may contain **one command** but **multiple cells**, e.g.:
          `guess A1 A2 B1 C1`
        - **Bare coordinates** with no preceding command will be interpreted as `guess` commands, e.g.:
            - `A1`    <=> `guess A1`
            - `A1 A2` <=> `guess A1 A2`,
            - `flag A1 A2` indicates `flag A1` and `flag A2`.
        - Each comment may contain **multiple commands on different lines**, e.g.:
          ```
          A1 A2 B1
          flag B2 C5
          A8
          guess D10
          ```
        - Use one action per line.
        - Any unrecognized token invalidates the whole turn.
        - Contradictory commands (e.g. `guess A1` and `flag A1` on two lines) will
          invalidate the whole turn.
        - Slash prefixes are optional but **unnecessary** (for example, `/flag A1`).
        - You do not have to flag all mines in order to solve the game.
        </details>

        Only you (the issue opener) can play in this room. Other users' comments will not
        affect the game - however, excessive comments, even by the issue owner, will be
        considered potential spam.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: By participating, you agree to follow our [Code of Conduct](https://github.com/hesreallyhim/github-minesweeper/.github/CODE_OF_CONDUCT.md).
      options:
        - label: I have read the Code of Conduct and agree to respect the rules and standards of this repository.
          required: true
    validations:
      required: true
