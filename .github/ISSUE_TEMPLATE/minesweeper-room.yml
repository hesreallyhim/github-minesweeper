name: "Minesweeper Room"
description: "Start a new Minesweeper game room"
title: "Minesweeper Room"
labels:
  - "game:minesweeper"
body:
  - type: markdown
    attributes:
      value: |
        **A new Minesweeper room will be created for you.**

        Play by commenting commands:

        - `A1 B2` or `guess A1 A2` - reveal cell(s)
        - `flag H7 H8` - flag suspected mine(s)
        - `unflag H7` - remove flag(s)
        - `giveup` - end the game

        Notes:
        - Commands are case-insensitive.
        - Use one action per line.
        - Any unrecognized token invalidates the whole turn.
        - Slash prefixes are optional (for example, `/flag A1`).

        Only you (the issue opener) can play in this room.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: By participating, you agree to follow our [Code of Conduct](https://github.com/hesreallyhim/).
      options:
        - label: I have read the Code of Conduct and agree to respect the rules and standards of this repository.
          required: true
    validations:
      required: true
