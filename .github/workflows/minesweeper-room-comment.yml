# Trigger: issue comment on an active minesweeper room.
# Action: parse command, apply move, post updated board.

name: Minesweeper Room Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  handle-move:
    if: >-
      contains(github.event.issue.labels.*.name, 'game:minesweeper')
      && !github.event.comment.user.bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            src
      - name: Handle command
        run: |
          PYTHONPATH=src python3 -c "
          from minesweeper.entrypoints import room_comment_entrypoint
          room_comment_entrypoint()
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINESWEEPER_SECRET: ${{ secrets.MINESWEEPER_SECRET }}
          MINESWEEPER_CLICK_BASE_URL: ${{ vars.MINESWEEPER_CLICK_BASE_URL }}
          MINESWEEPER_CLICK_TTL_SECONDS: ${{ vars.MINESWEEPER_CLICK_TTL_SECONDS }}
