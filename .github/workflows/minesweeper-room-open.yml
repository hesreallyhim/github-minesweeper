# Trigger: issue opened with the minesweeper room template.
# Action: initialize a game room and post the first board.

name: Minesweeper Room Open

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  init-room:
    if: contains(github.event.issue.labels.*.name, 'game:minesweeper')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            src
      - name: Initialize room
        run: |
          PYTHONPATH=src python3 -c "
          from minesweeper.entrypoints import room_open_entrypoint
          room_open_entrypoint()
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINESWEEPER_SECRET: ${{ secrets.MINESWEEPER_SECRET }}
          MINESWEEPER_CLICK_BASE_URL: ${{ vars.MINESWEEPER_CLICK_BASE_URL }}
          MINESWEEPER_CLICK_TTL_SECONDS: ${{ vars.MINESWEEPER_CLICK_TTL_SECONDS }}
