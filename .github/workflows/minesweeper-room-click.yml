# Trigger: repository_dispatch event from click relay.
# Action: validate signed click token and apply one board move.

name: Minesweeper Room Click

on:
  repository_dispatch:
    types: [minesweeper-click]

permissions:
  contents: write
  issues: write

jobs:
  handle-click:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            src
      - name: Handle click dispatch
        run: |
          PYTHONPATH=src python3 -c "
          from minesweeper.entrypoints import room_click_entrypoint
          room_click_entrypoint()
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINESWEEPER_SECRET: ${{ secrets.MINESWEEPER_SECRET }}
          MINESWEEPER_CLICK_BASE_URL: ${{ vars.MINESWEEPER_CLICK_BASE_URL }}
          MINESWEEPER_CLICK_TTL_SECONDS: ${{ vars.MINESWEEPER_CLICK_TTL_SECONDS }}
