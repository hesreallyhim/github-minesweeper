  <!-- cursor hovering over a cell -->
  <g transform="translate(1078, 96)">
    <path d="M 0,0 L 0,16 L 4,12 L 7,18 L 10,17 L 7,11 L 12,11 Z"
          fill="#f0f6fc" stroke="#0d1117" stroke-width="1.2" stroke-linejoin="round"/>
